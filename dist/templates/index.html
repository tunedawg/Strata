<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strata</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #080a0f;
  --surface:   #0f1118;
  --surface2:  #161b26;
  --surface3:  #1c2235;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --accent:    #3b82f6;
  --accent-hi: #60a5fa;
  --accent-lo: rgba(59,130,246,0.12);
  --accent2:   #818cf8;
  --success:   #34d399;
  --warning:   #fbbf24;
  --danger:    #f87171;
  --text:      #f1f5f9;
  --text2:     #64748b;
  --text3:     #334155;
  --mono:      'Cascadia Code', 'Fira Mono', 'Consolas', monospace;
  --sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --radius:    10px;
  --radius-sm: 6px;
  --transition: 0.15s ease;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ─────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 24px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,10,15,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky;
  top: 0;
  z-index: 100;
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-right: 32px;
}
.logo-mark {
  width: 26px;
  height: 26px;
  position: relative;
  flex-shrink: 0;
}
.logo-mark svg { width: 100%; height: 100%; }
.logo-name {
  font-size: 0.95rem;
  font-weight: 600;
  letter-spacing: -0.03em;
  color: var(--text);
}
.logo-name span {
  color: var(--accent-hi);
}

nav {
  display: flex;
  align-items: center;
  height: 100%;
  gap: 2px;
}
.nav-link {
  display: flex;
  align-items: center;
  height: 100%;
  padding: 0 16px;
  font-size: 0.8rem;
  font-weight: 500;
  text-decoration: none;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  transition: color var(--transition), border-color var(--transition);
  cursor: pointer;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: var(--sans);
  letter-spacing: 0.01em;
}
.nav-link:hover { color: var(--text); }
.nav-link.active {
  color: var(--accent-hi);
  border-bottom-color: var(--accent);
}

#status-pill {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  font-size: 0.72rem;
  font-family: var(--mono);
  color: var(--text2);
  background: var(--surface2);
  transition: all 0.3s;
  white-space: nowrap;
}
#status-pill.ready { border-color: rgba(52,211,153,0.3); color: var(--success); background: rgba(52,211,153,0.06); }
#status-pill.busy  { border-color: rgba(251,191,36,0.3);  color: var(--warning);  background: rgba(251,191,36,0.06); }
.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text3);
  flex-shrink: 0;
  transition: background 0.3s;
}
#status-pill.ready .dot { background: var(--success); animation: pulse 2.5s infinite; }
#status-pill.busy  .dot { background: var(--warning);  animation: pulse 0.9s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── Layout ──────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 260px 1fr;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  height: calc(100vh - 52px);
}

/* ── Sidebar ─────────────────────────────────────────────── */
aside {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-top {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-label {
  font-size: 0.65rem;
  font-family: var(--mono);
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}

.new-ds-form {
  display: flex;
  gap: 6px;
}
.new-ds-form input {
  flex: 1;
  padding: 8px 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.8rem;
  font-family: var(--sans);
  transition: border-color var(--transition);
  outline: none;
}
.new-ds-form input::placeholder { color: var(--text3); }
.new-ds-form input:focus { border-color: var(--accent); }
.new-ds-form .add-btn {
  width: 32px; height: 32px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  color: white;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background var(--transition);
  line-height: 1;
}
.new-ds-form .add-btn:hover { background: var(--accent-hi); }

.dataset-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}
.dataset-list::-webkit-scrollbar { width: 4px; }
.dataset-list::-webkit-scrollbar-track { background: transparent; }
.dataset-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.empty-ds {
  text-align: center;
  padding: 32px 16px;
  color: var(--text3);
  font-size: 0.78rem;
  font-family: var(--mono);
}

.dataset-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--transition);
  margin-bottom: 2px;
}
.dataset-item:hover { background: var(--surface2); }
.dataset-item.active {
  background: var(--accent-lo);
  border-color: rgba(59,130,246,0.2);
}
.ds-icon {
  width: 30px; height: 30px;
  border-radius: var(--radius-sm);
  background: var(--surface3);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}
.dataset-item.active .ds-icon { background: rgba(59,130,246,0.15); }
.ds-info { flex: 1; min-width: 0; }
.ds-name {
  font-size: 0.82rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}
.ds-meta {
  font-size: 0.68rem;
  color: var(--text2);
  font-family: var(--mono);
  margin-top: 1px;
}
.icon-btn {
  width: 22px; height: 22px;
  border-radius: 4px;
  border: none;
  background: none;
  color: var(--text3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  transition: all var(--transition);
  flex-shrink: 0;
  opacity: 0;
}
.dataset-item:hover .icon-btn { opacity: 1; }
.icon-btn:hover { background: rgba(248,113,113,0.12); color: var(--danger); }

/* Upload panel */
.upload-panel {
  border-top: 1px solid var(--border);
  padding: 14px 16px;
  display: none;
  flex-direction: column;
  gap: 10px;
}
.upload-panel.visible { display: flex; }
.upload-panel-title {
  font-size: 0.65rem;
  font-family: var(--mono);
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.upload-zone {
  border: 1px dashed var(--border2);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
  cursor: default;
  font-size: 0.75rem;
  color: var(--text2);
  line-height: 1.5;
}

.upload-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.btn-index {
  grid-column: span 2;
}

#upload-status {
  font-size: 0.72rem;
  font-family: var(--mono);
  color: var(--text2);
  min-height: 16px;
}
.upload-prog-track {
  height: 2px;
  background: var(--surface3);
  border-radius: 1px;
  overflow: hidden;
  display: none;
}
#upload-prog-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  width: 0%;
  transition: width 0.2s;
}

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 0.8rem;
  font-weight: 500;
  font-family: var(--sans);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  letter-spacing: 0.01em;
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { background: var(--accent-hi); }
.btn-ghost {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--border2); background: var(--surface3); }
.btn-sm { padding: 6px 12px; font-size: 0.75rem; }
.btn-export {
  background: rgba(129,140,248,0.12);
  color: var(--accent2);
  border: 1px solid rgba(129,140,248,0.2);
  font-size: 0.75rem;
  padding: 6px 12px;
}
.btn-export:hover { background: rgba(129,140,248,0.2); }

/* ── Main ────────────────────────────────────────────────── */
main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

.search-area {
  padding: 20px 28px 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.search-label {
  font-size: 0.65rem;
  font-family: var(--mono);
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 12px;
}

#terms-container {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 12px;
}
.term-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.term-row input {
  flex: 1;
  padding: 9px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.85rem;
  font-family: var(--mono);
  transition: border-color var(--transition), background var(--transition);
  outline: none;
}
.term-row input::placeholder { color: var(--text3); }
.term-row input:focus {
  border-color: var(--accent);
  background: var(--surface2);
}
.term-row .remove {
  width: 28px; height: 28px;
  background: none; border: none;
  color: var(--text3);
  cursor: pointer;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  transition: all var(--transition);
  flex-shrink: 0;
}
.term-row .remove:hover { color: var(--danger); background: rgba(248,113,113,0.1); }

.search-actions {
  display: flex;
  gap: 8px;
  padding: 12px 0;
  flex-wrap: wrap;
  align-items: center;
}
.syntax-hint {
  margin-left: auto;
  font-size: 0.68rem;
  font-family: var(--mono);
  color: var(--text3);
  line-height: 1.8;
  text-align: right;
}
.syntax-hint code { color: var(--text2); }

/* ── Results ─────────────────────────────────────────────── */
.results-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}
.results-area::-webkit-scrollbar { width: 4px; }
.results-area::-webkit-scrollbar-track { background: transparent; }
.results-area::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  gap: 12px;
  padding: 60px;
  user-select: none;
}
.empty-icon {
  width: 48px; height: 48px;
  opacity: 0.2;
}
.empty-state p {
  font-size: 0.82rem;
  font-family: var(--mono);
}

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--transition);
}
.result-card:hover { border-color: var(--border2); }

.result-header {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}
.result-header:hover { background: rgba(255,255,255,0.02); }

.result-term {
  font-family: var(--mono);
  font-size: 0.85rem;
  color: var(--text);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.badge {
  font-family: var(--mono);
  font-size: 0.68rem;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--accent-lo);
  color: var(--accent-hi);
  border: 1px solid rgba(59,130,246,0.2);
  white-space: nowrap;
  flex-shrink: 0;
}
.badge.zero {
  background: var(--surface2);
  color: var(--text3);
  border-color: var(--border);
}

.chevron {
  color: var(--text3);
  font-size: 0.65rem;
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.chevron.open { transform: rotate(90deg); }

.result-body { display: none; border-top: 1px solid var(--border); }
.result-body.open { display: block; }
.result-body-inner { padding: 14px 16px; }

.export-row {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 12px;
}

table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
th {
  text-align: left;
  padding: 7px 12px;
  background: var(--surface2);
  color: var(--text3);
  font-weight: 500;
  font-family: var(--mono);
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  color: var(--text2);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.015); color: var(--text); }
.doc-name { color: var(--text); font-weight: 500; font-size: 0.8rem; }
.chunks-cell { font-family: var(--mono); font-size: 0.72rem; }

.chunk-tag {
  display: inline-block;
  background: var(--surface2);
  color: var(--accent-hi);
  padding: 2px 7px;
  border-radius: 4px;
  margin: 1px 2px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--transition);
  font-size: 0.7rem;
}
.chunk-tag:hover {
  background: var(--accent-lo);
  border-color: rgba(59,130,246,0.3);
  color: white;
}

.no-results {
  text-align: center;
  color: var(--text3);
  padding: 24px;
  font-size: 0.8rem;
  font-family: var(--mono);
}

/* ── Loading overlay ─────────────────────────────────────── */
#loading {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
#loading.show { display: flex; }
.spinner {
  width: 36px; height: 36px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="5" width="20" height="4" rx="2" fill="#3b82f6" opacity="1"/>
        <rect x="3" y="11" width="20" height="4" rx="2" fill="#3b82f6" opacity="0.6"/>
        <rect x="3" y="17" width="20" height="4" rx="2" fill="#3b82f6" opacity="0.3"/>
      </svg>
    </div>
    <span class="logo-name">Strata</span>
  </div>

  <nav>
    <a href="#" class="nav-link active">Index</a>
    <a href="#" onclick="navigate('production.html')" class="nav-link">Production</a>
    <a href="#" onclick="navigate('redactions.html')" class="nav-link">Redactions</a>
  </nav>

  <div id="status-pill">
    <div class="dot"></div>
    <span id="status-text">No dataset loaded</span>
  </div>
</header>

<div class="app">

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-top">
      <div class="sidebar-label">Productions</div>
      <div class="new-ds-form">
        <input type="text" id="new-ds-name" placeholder="New production…"
          onkeydown="if(event.key==='Enter') createDataset()">
        <button class="add-btn" onclick="createDataset()">+</button>
      </div>
    </div>

    <div class="dataset-list" id="dataset-list">
      <div class="empty-ds">No productions yet</div>
    </div>

    <div class="upload-panel" id="upload-section">
      <div class="upload-panel-title" id="upload-title">Files</div>
      <div class="upload-zone">
        PDF · DOCX · XLSX · EML · MSG · PPTX · TXT · images
      </div>
      <div class="upload-btns">
        <button class="btn btn-ghost btn-sm" onclick="pickAndUpload(false)">📄 Add Files</button>
        <button class="btn btn-ghost btn-sm" onclick="pickAndUpload(true)">📁 Add Folder</button>
        <button class="btn btn-primary btn-sm btn-index" onclick="indexDataset()">⚡ Build Index</button>
      </div>
      <div id="upload-status"></div>
      <div class="upload-prog-track" id="upload-prog-wrap">
        <div id="upload-prog-bar"></div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="search-area">
      <div class="search-label">Search Terms</div>
      <div id="terms-container"></div>
      <div class="search-actions">
        <button class="btn btn-primary btn-sm" id="search-btn" onclick="doSearch()" disabled>Search</button>
        <button class="btn btn-ghost btn-sm" onclick="addTerm()">+ Term</button>
        <button class="btn btn-ghost btn-sm" onclick="clearTerms()">Clear</button>
        <button class="btn btn-ghost btn-sm" id="report-xlsx-btn" onclick="doHitReport('xlsx')" disabled>Hit Report ↗</button>
        <button class="btn btn-ghost btn-sm" id="report-pdf-btn" onclick="doHitReport('pdf')" disabled>Hit Report PDF ↗</button>
        <div class="syntax-hint">
          <code>AND</code> <code>OR</code> <code>NOT</code> &nbsp;
          <code>"exact phrase"</code> &nbsp;
          <code>run*</code> &nbsp;
          <code>~fuzzy</code> &nbsp;
          <code>"a" W/10 "b"</code>
        </div>
      </div>
    </div>

    <div class="results-area" id="results-area">
      <div class="empty-state">
        <svg class="empty-icon" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="10" width="36" height="6" rx="3" fill="currentColor"/>
          <rect x="6" y="21" width="36" height="6" rx="3" fill="currentColor"/>
          <rect x="6" y="32" width="24" height="6" rx="3" fill="currentColor"/>
        </svg>
        <p>Select a production and search</p>
      </div>
    </div>
  </main>
</div>

<div id="loading"><div class="spinner"></div></div>

<script>
let activeDataset  = null;
let currentResults = {};

// ── pywebview bridge ─────────────────────────────────────────────────────────
// All API calls go through window.pywebview.api
// pywebview injects this after the page loads, so we wait for it.
function waitForApi() {
  return new Promise(resolve => {
    if (window.pywebview && window.pywebview.api) { resolve(); return; }
    // Poll as fallback — pywebviewready can fire before listener is registered
    const check = setInterval(() => {
      if (window.pywebview && window.pywebview.api) {
        clearInterval(check);
        resolve();
      }
    }, 50);
    window.addEventListener('pywebviewready', () => {
      clearInterval(check);
      resolve();
    }, { once: true });
  });
}

async function api(method, ...args) {
  await waitForApi();
  return window.pywebview.api[method](...args);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function navigate(page) {
  // Find path of current file and load sibling page
  const base = window.location.href.replace(/[^/]+$/, '');
  window.location.href = base + page;
}

// ── Status polling ────────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const d    = await api('get_index_status');
    const pill = document.getElementById('status-pill');
    const text = document.getElementById('status-text');
    const btn  = document.getElementById('search-btn');

    if (d.status === 'indexing') {
      pill.className = 'busy';
      const pct = d.total ? Math.round(d.done / d.total * 100) : 0;
      text.textContent = `Indexing ${d.dataset}… ${d.done}/${d.total} (${pct}%)`;
      setTimeout(pollStatus, 1500);
    } else if (d.status === 'loading') {
      pill.className = 'busy';
      text.textContent = `Loading ${d.dataset}…`;
      setTimeout(pollStatus, 800);
    } else if (d.status === 'ready' && d.loaded) {
      pill.className = 'ready';
      text.textContent = `${d.loaded}  ·  ${d.done} files`;
      btn.disabled = false;
      refreshDatasets();
      setTimeout(pollStatus, 3000);
    } else {
      pill.className = '';
      text.textContent = 'No dataset loaded';
      btn.disabled = true;
      setTimeout(pollStatus, 3000);
    }
  } catch(e) {
    setTimeout(pollStatus, 3000);
  }
}

// ── Datasets ──────────────────────────────────────────────────────────────────
async function refreshDatasets() {
  const d    = await api('get_datasets');
  const list = document.getElementById('dataset-list');
  const datasets = d.datasets || [];
  if (!datasets.length) {
    list.innerHTML = `<div style="color:var(--text3);font-size:0.8rem;font-family:var(--mono);text-align:center;padding:20px">No datasets yet</div>`;
    return;
  }
  list.innerHTML = datasets.map(ds => `
    <div class="dataset-item ${ds.name === activeDataset ? 'active' : ''}"
         onclick="selectDataset('${esc(ds.name)}', ${ds.indexed})">
      <div class="ds-icon">${ds.indexed ? '📚' : '📁'}</div>
      <div class="ds-info">
        <div class="ds-name">${esc(ds.name)}</div>
        <div class="ds-meta">${ds.files} file${ds.files !== 1 ? 's' : ''}${ds.indexed ? ' · indexed' : ' · not indexed'}</div>
      </div>
      <button class="icon-btn" title="Delete dataset" onclick="event.stopPropagation(); deleteDataset('${esc(ds.name)}')" style="color:var(--danger);opacity:0.6">🗑</button>
    </div>`).join('');
}

async function deleteDataset(name) {
  if (!confirm(`Delete dataset "${name}" and all its files? This cannot be undone.`)) return;
  const d = await api('delete_dataset', name);
  if (d.error) { alert('Error: ' + d.error); return; }
  if (activeDataset === name) {
    activeDataset = null;
    document.getElementById('upload-section').style.display = 'none';
  }
  refreshDatasets();
  pollStatus();
}

async function selectDataset(name, indexed) {
  activeDataset = name;
  document.getElementById('upload-section').style.display = 'block';
  document.getElementById('upload-title').textContent = `Files in: ${name}`;
  refreshDatasets();
  if (indexed) {
    const d = await api('load_dataset', name);
    if (d.ok) pollStatus();
  }
}

async function createDataset() {
  const input = document.getElementById('new-ds-name');
  const name  = input.value.trim();
  if (!name) return;
  const d = await api('create_dataset', name);
  if (d.error) { alert(d.error); return; }
  input.value = '';
  refreshDatasets();
  selectDataset(name, false);
}

// ── Upload ────────────────────────────────────────────────────────────────────
// pywebview provides a native file/folder picker dialog.
// OPEN_DIALOG = 10, FOLDER_DIALOG = 20 (pywebview constants)
const OPEN_DIALOG   = 10;
const FOLDER_DIALOG = 20;

async function pickAndUpload(folder) {
  if (!activeDataset) return;
  await waitForApi();
  const statusEl = document.getElementById('upload-status');
  const progWrap = document.getElementById('upload-prog-wrap');
  const progBar  = document.getElementById('upload-prog-bar');

  try {
    if (folder) {
      // Pick a folder — returns a single string (the folder path) or null
      const result = await window.pywebview.windows[0].create_file_dialog(
        FOLDER_DIALOG
      );
      if (!result || !result.length) return;
      const folderPath = result[0];
      statusEl.textContent = 'Reading folder…';

      // Ask Python to walk the folder and upload everything
      const d = await api('upload_folder', activeDataset, null, folderPath);
      if (d.error) { statusEl.textContent = 'Error: ' + d.error; return; }
      statusEl.textContent = `✓ ${d.saved.length} file${d.saved.length !== 1 ? 's' : ''} uploaded`;
    } else {
      // Pick individual files — returns array of paths
      const result = await window.pywebview.windows[0].create_file_dialog(
        OPEN_DIALOG, undefined, true,
        'Documents (*.pdf;*.docx;*.doc;*.pptx;*.ppt;*.csv;*.xlsx;*.xls;*.txt;*.md;*.rtf;*.eml;*.msg;*.png;*.jpg;*.jpeg;*.tif;*.tiff;*.bmp)'
      );
      if (!result || !result.length) return;

      statusEl.textContent = `Uploading ${result.length} file${result.length !== 1 ? 's' : ''}…`;
      progWrap.style.display = 'block'; progBar.style.width = '0%';

      // Upload in batches of 50 paths at a time
      const BATCH = 50;
      let saved = [], done = 0;
      for (let i = 0; i < result.length; i += BATCH) {
        const batch = result.slice(i, i + BATCH);
        const d     = await api('upload_files', activeDataset, batch);
        if (d.error) { statusEl.textContent = 'Error: ' + d.error; progWrap.style.display = 'none'; return; }
        saved = saved.concat(d.saved || []);
        done += batch.length;
        progBar.style.width = Math.round(done / result.length * 100) + '%';
        statusEl.textContent = `Uploading… ${done} / ${result.length}`;
      }
      progWrap.style.display = 'none';
      statusEl.textContent = `✓ ${saved.length} file${saved.length !== 1 ? 's' : ''} uploaded`;
    }
    refreshDatasets();
  } catch(e) {
    statusEl.textContent = 'Upload error: ' + e;
    progWrap.style.display = 'none';
  }
}

// Drag-and-drop is not supported in pywebview — show a friendly message
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag');
  document.getElementById('upload-status').textContent = 'Use the Files or Folder buttons to upload.';
}

async function indexDataset() {
  if (!activeDataset) return;
  const d = await api('build_index', activeDataset);
  if (d.error) { alert(d.error); return; }
  pollStatus();
}

// ── Search terms ──────────────────────────────────────────────────────────────
function addTerm(value = '') {
  const row = document.createElement('div');
  row.className = 'term-row';
  row.innerHTML = `
    <input type="text" placeholder='e.g. "project plan" AND NOT cancelled' value="${esc(value)}"
      onkeydown="if(event.key==='Enter') doSearch()">
    <button class="remove" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('terms-container').appendChild(row);
  row.querySelector('input').focus();
}

function getTerms() {
  return [...document.querySelectorAll('.term-row input')]
    .map(i => i.value.trim()).filter(Boolean);
}

function clearTerms() {
  document.getElementById('terms-container').innerHTML = '';
  document.getElementById('results-area').innerHTML =
    `<div class="empty-state"><div class="big-icon">⌕</div><p>Load a dataset and start searching</p></div>`;
  document.getElementById('report-xlsx-btn').disabled = true;
  document.getElementById('report-pdf-btn').disabled  = true;
  addTerm();
}

// ── Search ────────────────────────────────────────────────────────────────────
async function doSearch() {
  const terms = getTerms();
  if (!terms.length) return;
  document.getElementById('loading').classList.add('show');
  try {
    const data = await api('search', terms);
    if (data.error) { alert('Search error: ' + data.error); return; }
    currentResults = data.results;
    renderResults(data);
    document.getElementById('report-xlsx-btn').disabled = false;
    document.getElementById('report-pdf-btn').disabled  = false;
  } catch(e) {
    alert('Search error: ' + e);
  } finally {
    document.getElementById('loading').classList.remove('show');
  }
}

function renderResults(data) {
  const area = document.getElementById('results-area');
  area.innerHTML = '';
  const terms = Object.keys(data.results || {});
  if (!terms.length) {
    area.innerHTML = `<div class="empty-state"><div class="big-icon">🤷</div><p>No terms searched</p></div>`;
    return;
  }
  terms.forEach(term => {
    const r    = data.results[term];
    const hits = r.total_hits || 0;
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-header" onclick="toggleCard(this)">
        <span class="result-term">${esc(term)}</span>
        <span class="badge ${hits===0?'zero':''}"> ${hits.toLocaleString()} chunk${hits!==1?'s':''}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="result-body">
        <div class="result-body-inner">
          ${r.error ? `<p style="color:var(--danger)">Error: ${esc(r.error)}</p>` : ''}
          ${hits > 0 ? `
          <div class="export-row">
            <button class="btn btn-export" onclick='doExport(${JSON.stringify(term)})'>
              ↓ Export PDF
            </button>
          </div>
          <table>
            <thead><tr><th>File</th><th>Matching chunks</th><th>#</th></tr></thead>
            <tbody>
              ${r.docs.map(d => `
                <tr>
                  <td class="doc-name">${esc(d.name)}</td>
                  <td class="chunks-cell">${d.chunks.map(c => {
                    const pageMatch = c.match(/^p(\d+)$/);
                    const pageNum   = pageMatch ? parseInt(pageMatch[1]) : null;
                    const dataset   = data.dataset || activeDataset;
                    return `<span class="chunk-tag" onclick="openFile('${esc(dataset)}','${esc(d.name)}',${pageNum||'null'})" title="Open ${esc(d.name)} at ${esc(c)}">${esc(c)}</span>`;
                  }).join('')}</td>
                  <td>${d.chunks.length}</td>
                </tr>`).join('')}
            </tbody>
          </table>` : `<div class="no-results">No matches found</div>`}
        </div>
      </div>`;
    area.appendChild(card);
  });
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.chevron');
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

async function openFile(dataset, docName, pageNum) {
  const d = await api('open_file', dataset, docName, pageNum);
  if (d.error) alert('Could not open file: ' + d.error);
}

async function doHitReport(fmt) {
  if (!currentResults || !Object.keys(currentResults).length) {
    alert('Run a search first.');
    return;
  }
  document.getElementById('loading').classList.add('show');
  try {
    const d = await api('export_hit_report', currentResults, fmt);
    if (d.error) alert('Hit report error: ' + d.error);
    // File opens automatically in system viewer
  } catch(e) {
    alert('Hit report error: ' + e);
  } finally {
    document.getElementById('loading').classList.remove('show');
  }
}

async function doExport(term) {
  const r = currentResults[term];
  if (!r) return;
  const d = await api('export_search_pdf', term, r.docs, activeDataset);
  if (d.error) alert('Export error: ' + d.error);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
addTerm();
waitForApi().then(() => {
  refreshDatasets();
  pollStatus();
});
</script>
