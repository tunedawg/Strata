<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redaction Detection — Universal Search</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0f14;
  --surface:   #151820;
  --surface2:  #1c2030;
  --border:    #252a3a;
  --accent:    #4f8ef7;
  --accent2:   #a78bfa;
  --success:   #34d399;
  --warning:   #fbbf24;
  --danger:    #f87171;
  --redact:    #fb923c;
  --text:      #e2e8f0;
  --text2:     #8892a4;
  --text3:     #4a5568;
  --mono:      'DM Mono', monospace;
  --sans:      'DM Sans', sans-serif;
}

body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

/* ── Header ── */
header { display: flex; align-items: center; gap: 16px; padding: 18px 32px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--redact), #f43f5e); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.logo h1 { font-size: 1rem; font-weight: 600; letter-spacing: -0.02em; }
.logo span { font-size: 0.75rem; color: var(--text2); font-family: var(--mono); }
.nav-link { padding: 6px 14px; border-radius: 6px; font-size: 0.82rem; font-weight: 500; text-decoration: none; color: var(--text2); transition: all 0.15s; }
.nav-link:hover { color: var(--text); background: var(--surface2); }
.nav-link.active { color: var(--redact); background: rgba(251,146,60,0.1); }

/* ── Layout ── */
.app { display: grid; grid-template-columns: 280px 1fr; flex: 1; min-height: 0; overflow: hidden; }

/* ── Sidebar ── */
aside { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.sidebar-section h3 { font-size: 0.68rem; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }

label { display: block; font-size: 0.78rem; color: var(--text2); margin-bottom: 4px; }
select { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.84rem; font-family: var(--sans); transition: border-color 0.2s; cursor: pointer; }
select:focus { outline: none; border-color: var(--redact); }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 8px; border: none; font-size: 0.85rem; font-weight: 500; font-family: var(--sans); cursor: pointer; transition: all 0.15s; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary { background: var(--redact); color: white; }
.btn-primary:hover:not(:disabled) { background: #ea7c2a; }
.btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--text3); }
.btn-danger { background: rgba(248,113,113,0.15); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
.btn-danger:hover:not(:disabled) { background: rgba(248,113,113,0.25); }

/* ── Progress ── */
.progress-wrap { padding: 14px 20px; border-bottom: 1px solid var(--border); display: none; }
.progress-wrap.show { display: block; }
.progress-label { font-size: 0.75rem; font-family: var(--mono); color: var(--text2); margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-bar-bg { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--redact); border-radius: 2px; transition: width 0.3s; width: 0%; }
.progress-file { font-size: 0.7rem; color: var(--text3); font-family: var(--mono); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Stats panel ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
.stat-box .stat-val { font-size: 1.3rem; font-family: var(--mono); font-weight: 500; color: var(--redact); line-height: 1; }
.stat-box .stat-lbl { font-size: 0.66rem; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }
.stat-box.green .stat-val { color: var(--success); }
.stat-box.blue  .stat-val { color: var(--accent); }

/* ── Main ── */
main { display: flex; flex-direction: column; overflow: hidden; }

/* Toolbar */
.toolbar { display: flex; align-items: center; gap: 8px; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; flex-wrap: wrap; }
.toolbar-info { font-size: 0.8rem; font-family: var(--mono); color: var(--text3); flex: 1; min-width: 160px; }
.toolbar-info span { color: var(--redact); }
.toolbar.hide { display: none; }

/* Results area */
.results-area { flex: 1; overflow-y: auto; padding: 24px 32px; display: flex; flex-direction: column; gap: 14px; }

/* Empty state */
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); gap: 12px; padding: 60px; }
.empty-state .big-icon { font-size: 3.5rem; opacity: 0.3; }
.empty-state p { font-size: 0.9rem; font-family: var(--mono); }

/* Document cards */
.doc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
.doc-card:hover { border-color: var(--text3); }
.doc-card.has-redactions { border-left: 3px solid var(--redact); }

.doc-card-header { display: flex; align-items: center; gap: 12px; padding: 13px 18px; cursor: pointer; user-select: none; }
.doc-card-header:hover { background: rgba(255,255,255,0.02); }

.doc-icon { font-size: 1.1rem; flex-shrink: 0; }
.doc-name { font-size: 0.87rem; font-weight: 500; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.finding-badge { font-family: var(--mono); font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.finding-badge.has { background: rgba(251,146,60,0.15); color: var(--redact); border: 1px solid rgba(251,146,60,0.3); }
.finding-badge.none { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
.finding-badge.clean { background: rgba(52,211,153,0.1); color: var(--success); border: 1px solid rgba(52,211,153,0.25); }

.chevron { color: var(--text3); font-size: 0.75rem; transition: transform 0.2s; flex-shrink: 0; }
.chevron.open { transform: rotate(90deg); }

.doc-card-body { display: none; border-top: 1px solid var(--border); }
.doc-card-body.open { display: block; }

/* Findings table */
.findings-table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
thead { position: sticky; top: 0; z-index: 5; }
th { text-align: left; padding: 8px 14px; background: var(--surface2); color: var(--text3); font-weight: 500; font-family: var(--mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 9px 14px; border-bottom: 1px solid rgba(37,42,58,0.6); vertical-align: middle; color: var(--text2); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.015); }

.type-chip { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-family: var(--mono); white-space: nowrap; }
.type-chip.pdf-annotation { background: rgba(167,139,250,0.12); color: var(--accent2); border: 1px solid rgba(167,139,250,0.25); }
.type-chip.black-bar    { background: rgba(248,113,113,0.12); color: var(--danger); border: 1px solid rgba(248,113,113,0.25); }
.type-chip.white-box    { background: rgba(251,146,60,0.12);  color: var(--redact); border: 1px solid rgba(251,146,60,0.25); }
.type-chip.white-text   { background: rgba(251,191,36,0.12);  color: var(--warning); border: 1px solid rgba(251,191,36,0.25); }
.type-chip.docx         { background: rgba(79,142,247,0.12);  color: var(--accent); border: 1px solid rgba(79,142,247,0.25); }
.type-chip.other        { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

.page-cell { font-family: var(--mono); font-size: 0.78rem; color: var(--accent); white-space: nowrap; }
.loc-cell  { font-family: var(--mono); font-size: 0.72rem; color: var(--text3); white-space: nowrap; }
.detail-cell { font-size: 0.78rem; color: var(--text2); max-width: 340px; }

.no-findings { padding: 16px 18px; font-size: 0.82rem; font-family: var(--mono); color: var(--success); }

/* Loading spinner */
#loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; }
#loading.show { display: flex; }
.spinner-ring { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--redact); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">◼</div>
    <div>
      <h1>Universal Search</h1>
      <span>redaction detection</span>
    </div>
  </div>
  <nav style="display:flex;gap:4px;margin-left:24px;">
    <a href="/" class="nav-link">📇 Index</a>
    <a href="/production" class="nav-link">📦 Production</a>
    <a href="/redactions" class="nav-link active">◼ Redactions</a>
    <a href="/log" class="nav-link">📋 Log</a>
  </nav>
</header>

<div class="app">

  <!-- ── Sidebar ── -->
  <aside>

    <div class="sidebar-section">
      <h3>Dataset</h3>
      <select id="dataset-select" onchange="onDatasetChange()">
        <option value="">— Select an indexed dataset —</option>
      </select>
    </div>

    <div class="sidebar-section">
      <h3>Detection Scope</h3>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
          <input type="checkbox" id="chk-pdf-annot" checked> <span style="font-size:0.8rem;color:var(--text)">PDF annotation redactions</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
          <input type="checkbox" id="chk-black-bar" checked> <span style="font-size:0.8rem;color:var(--text)">Black redaction bars</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
          <input type="checkbox" id="chk-white-box" checked> <span style="font-size:0.8rem;color:var(--text)">White-out boxes</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
          <input type="checkbox" id="chk-white-text" checked> <span style="font-size:0.8rem;color:var(--text)">White / hidden text</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
          <input type="checkbox" id="chk-docx" checked> <span style="font-size:0.8rem;color:var(--text)">Word document redactions</span>
        </label>
      </div>
    </div>

    <div class="sidebar-section">
      <button class="btn btn-primary" id="scan-btn" onclick="startScan()" disabled style="width:100%">
        ◼ Scan for Redactions
      </button>
      <button class="btn btn-danger" id="cancel-btn" onclick="cancelScan()" style="width:100%;margin-top:8px;display:none">
        ✕ Cancel Scan
      </button>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-label">
        <span id="prog-label">Scanning…</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar"></div></div>
      <div class="progress-file" id="prog-file"></div>
    </div>

    <div class="sidebar-section" id="stats-section" style="display:none">
      <h3>Scan Results</h3>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-val" id="stat-total">0</div>
          <div class="stat-lbl">Files Scanned</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stat-redacted">0</div>
          <div class="stat-lbl">With Redactions</div>
        </div>
        <div class="stat-box blue">
          <div class="stat-val" id="stat-findings">0</div>
          <div class="stat-lbl">Total Findings</div>
        </div>
        <div class="stat-box green">
          <div class="stat-val" id="stat-clean">0</div>
          <div class="stat-lbl">Clean Files</div>
        </div>
      </div>
    </div>

  </aside>

  <!-- ── Main ── -->
  <main>

    <!-- Export toolbar (hidden until results ready) -->
    <div class="toolbar hide" id="toolbar">
      <div class="toolbar-info" id="toolbar-info">
        Showing <span id="info-count">0</span> documents with redactions
      </div>
      <button class="btn btn-ghost" onclick="exportZip()" title="Download all redacted documents as a ZIP archive" style="font-size:0.82rem">
        ⬇ Documents (zip)
      </button>
      <button class="btn btn-ghost" onclick="exportList()" title="Export finding list as Excel" style="font-size:0.82rem">
        ⬇ List (xlsx)
      </button>
      <button class="btn btn-ghost" onclick="exportReportXlsx()" title="Export full report as Excel" style="font-size:0.82rem">
        ⬇ Report (xlsx)
      </button>
      <button class="btn btn-ghost" onclick="exportReportPdf()" title="Export full report as PDF" style="font-size:0.82rem;border-color:rgba(251,146,60,0.4);color:var(--redact)">
        ⬇ Report (pdf)
      </button>
    </div>

    <!-- Results area -->
    <div class="results-area" id="results-area">
      <div class="empty-state" id="empty-state">
        <div class="big-icon">◼</div>
        <p>Select a dataset and click Scan for Redactions</p>
      </div>
    </div>

  </main>
</div>

<div id="loading"><div class="spinner-ring"></div></div>

<script>
function waitForApi() {
  return new Promise(resolve => {
    if (window.pywebview && window.pywebview.api) { resolve(); return; }
    window.addEventListener('pywebviewready', () => resolve(), { once: true });
  });
}
async function api(method, ...args) {
  await waitForApi();
  return window.pywebview.api[method](...args);
}

/* ─────────────────────────────────────────
   State
───────────────────────────────────────── */
let pollTimer = null;
let scanResults = null;
let scanDataset  = "";

/* ─────────────────────────────────────────
   Init
───────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  waitForApi().then(() => loadDatasets());
});

async function loadDatasets() {
  try {
    const _dsresp = await api('get_datasets');
    const sel = document.getElementById('dataset-select');
    const list = _dsresp.datasets || [];
    const indexed = list.filter(d => typeof d === 'object' ? d.indexed : true);
    if (!indexed.length) {
      sel.innerHTML = '<option value="">— No indexed datasets —</option>';
      return;
    }
    indexed.forEach(d => {
      const opt = document.createElement('option');
      const name  = typeof d === 'object' ? d.name  : d;
      const files = typeof d === 'object' ? d.files : '';
      opt.value = name;
      opt.textContent = files ? `${name} (${files} files)` : name;
      sel.appendChild(opt);
    });
  } catch(e) { console.error('loadDatasets', e); }
}

function onDatasetChange() {
  const ds = document.getElementById('dataset-select').value;
  document.getElementById('scan-btn').disabled = !ds;
}

/* ─────────────────────────────────────────
   Scan
───────────────────────────────────────── */
async function startScan() {
  const ds = document.getElementById('dataset-select').value;
  if (!ds) return;
  scanDataset = ds;

  // Reset UI
  scanResults = null;
  setResultsArea('<div class="empty-state"><div class="big-icon" style="animation:pulse 1.5s infinite">◼</div><p>Scanning documents…</p></div>');
  document.getElementById('toolbar').classList.add('hide');
  document.getElementById('stats-section').style.display = 'none';
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('cancel-btn').style.display = 'block';
  showProgress(true);

  try {
    const d = await api('start_redaction_scan', ds);
    if (d.status === 'started' || d.status === 'running' || d.ok) {
      pollTimer = setInterval(pollStatus, 1200);
    } else {
      showError(d.error || 'Could not start scan');
      resetScanUI();
    }
  } catch(e) {
    showError('Network error: ' + e.message);
    resetScanUI();
  }
}

async function pollStatus() {
  try {
    const d = await api('get_redaction_status');

    const pct = d.percent || 0;
    document.getElementById('prog-bar').style.width = pct + '%';
    document.getElementById('prog-pct').textContent = pct + '%';
    document.getElementById('prog-label').textContent = d.message || 'Scanning…';
    document.getElementById('prog-file').textContent = d.current_file || '';

    if (d.status === 'done') {
      clearInterval(pollTimer);
      pollTimer = null;
      await loadResults();
    } else if (d.status === 'cancelled') {
      clearInterval(pollTimer);
      pollTimer = null;
      resetScanUI();
      setResultsArea('<div class="empty-state"><div class="big-icon">◼</div><p>Scan cancelled</p></div>');
    } else if (d.status === 'error') {
      clearInterval(pollTimer);
      pollTimer = null;
      resetScanUI();
      showError(d.message || 'Scan error');
    }
  } catch(e) { console.warn('poll error', e); }
}

async function cancelScan() {
  try { await api('cancel_redaction_scan'); }
  catch(e) {}
}

async function loadResults() {
  try {
    const data = await api('get_redaction_results');
    scanResults = data;
    renderResults(data);
    resetScanUI();
    showProgress(false);
  } catch(e) {
    showError('Could not load results');
    resetScanUI();
  }
}

/* ─────────────────────────────────────────
   Render results
───────────────────────────────────────── */
function renderResults(data) {
  const docs = data.documents || [];
  const findings_total = data.total_findings || 0;
  const redacted_docs = docs.filter(d => d.findings && d.findings.length > 0);
  const clean_docs    = docs.filter(d => !d.findings || d.findings.length === 0);

  // Stats panel
  document.getElementById('stat-total').textContent    = docs.length;
  document.getElementById('stat-redacted').textContent = redacted_docs.length;
  document.getElementById('stat-findings').textContent = findings_total;
  document.getElementById('stat-clean').textContent    = clean_docs.length;
  document.getElementById('stats-section').style.display = 'block';

  // Toolbar
  const tb = document.getElementById('toolbar');
  document.getElementById('info-count').textContent = redacted_docs.length;
  tb.classList.remove('hide');

  if (docs.length === 0) {
    setResultsArea('<div class="empty-state"><div class="big-icon">◼</div><p>No documents found in this dataset</p></div>');
    return;
  }

  // Sort: redacted first, then alphabetical
  const sorted = [...redacted_docs].sort((a,b) => {
    const fa = a.findings ? a.findings.length : 0;
    const fb = b.findings ? b.findings.length : 0;
    return fb - fa || a.filename.localeCompare(b.filename);
  });
  const allSorted = [...sorted, ...clean_docs.sort((a,b) => a.filename.localeCompare(b.filename))];

  const area = document.getElementById('results-area');
  area.innerHTML = '';

  allSorted.forEach(doc => {
    area.appendChild(buildDocCard(doc));
  });
}

function buildDocCard(doc) {
  const card = document.createElement('div');
  const hasFindings = doc.findings && doc.findings.length > 0;
  card.className = 'doc-card' + (hasFindings ? ' has-redactions' : '');

  const ext = (doc.filename || '').split('.').pop().toLowerCase();
  const icon = ext === 'pdf' ? '📄' : ext === 'docx' || ext === 'doc' ? '📝' : '📃';
  const count = hasFindings ? doc.findings.length : 0;

  const badgeClass = hasFindings ? 'has' : 'clean';
  const badgeText  = hasFindings ? count + ' finding' + (count !== 1 ? 's' : '') : 'clean';

  card.innerHTML = `
    <div class="doc-card-header" onclick="toggleCard(this)">
      <span class="doc-icon">${icon}</span>
      ${scanDataset && doc.filename.toLowerCase().endsWith('.pdf')
        ? `<span class="doc-name" onclick="openFile(scanDataset,doc.filename,null)" title="Open ${esc(doc.filename)}" style="cursor:pointer;color:var(--text)">${esc(doc.filename)}</span>`
        : `<span class="doc-name" title="${esc(doc.filepath || doc.filename)}">${esc(doc.filename)}</span>`
      }
      <span class="finding-badge ${badgeClass}">${badgeText}</span>
      <span class="chevron">▶</span>
    </div>
    <div class="doc-card-body">
      ${buildFindingsTable(doc)}
    </div>
  `;

  // Auto-expand if has findings
  if (hasFindings) {
    const header  = card.querySelector('.doc-card-header');
    const body    = card.querySelector('.doc-card-body');
    const chevron = card.querySelector('.chevron');
    body.classList.add('open');
    chevron.classList.add('open');
  }

  return card;
}

function buildFindingsTable(doc) {
  if (!doc.findings || doc.findings.length === 0) {
    return `<div class="no-findings">✓ No redactions detected</div>`;
  }

  const rows = doc.findings.map(f => {
    const chipClass = getChipClass(f.type);
    const pageNum = f.page != null ? f.page : null;
    const docPath = doc.filename.split('/').map(encodeURIComponent).join('/');
    const previewUrl = pageNum && scanDataset
      ? `/preview/${encodeURIComponent(scanDataset)}/${docPath}#page=${pageNum}`
      : null;
    const pageCell = pageNum != null
      ? (previewUrl
          ? `<span onclick="openFile(scanDataset,doc.filename,${pageNum})" title="Open page ${pageNum}" style="color:var(--accent);cursor:pointer;font-family:var(--mono);font-size:0.78rem;">Page ${pageNum}</span>`
          : `Page ${pageNum}`)
      : '—';
    const loc     = f.location || (f.bbox ? formatBbox(f.bbox) : '—');
    const details = esc(f.details || f.type);
    return `<tr>
      <td class="page-cell">${pageCell}</td>
      <td><span class="type-chip ${chipClass}">${esc(f.type)}</span></td>
      <td class="loc-cell">${esc(loc)}</td>
      <td class="detail-cell">${details}</td>
    </tr>`;
  }).join('');

  return `
    <div class="findings-table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:80px">Page</th>
            <th style="width:200px">Redaction Type</th>
            <th style="width:200px">Location</th>
            <th>Details</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function getChipClass(type) {
  if (!type) return 'other';
  const t = type.toLowerCase();
  if (t.includes('pdf') || t.includes('annotation')) return 'pdf-annotation';
  if (t.includes('black')) return 'black-bar';
  if (t.includes('white box') || t.includes('whiteout')) return 'white-box';
  if (t.includes('white text') || t.includes('white ink') || t.includes('hidden')) return 'white-text';
  if (t.includes('word') || t.includes('docx') || t.includes('highlight') || t.includes('font')) return 'docx';
  return 'other';
}

function formatBbox(b) {
  if (!Array.isArray(b) || b.length < 4) return '—';
  return `(${b[0].toFixed(0)}, ${b[1].toFixed(0)}, ${b[2].toFixed(0)}, ${b[3].toFixed(0)})`;
}

function toggleCard(header) {
  const body    = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

/* ─────────────────────────────────────────
   Helpers
───────────────────────────────────────── */
function triggerDownload(blob, name) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 300);
}

function setResultsArea(html) {
  document.getElementById('results-area').innerHTML = html;
}

function showProgress(show) {
  document.getElementById('progress-wrap').classList.toggle('show', show);
  if (!show) {
    document.getElementById('prog-bar').style.width = '0%';
    document.getElementById('prog-pct').textContent = '0%';
    document.getElementById('prog-file').textContent = '';
    document.getElementById('prog-label').textContent = 'Scanning…';
  }
}

function resetScanUI() {
  const ds = document.getElementById('dataset-select').value;
  document.getElementById('scan-btn').disabled = !ds;
  document.getElementById('cancel-btn').style.display = 'none';
}

function showLoading(show) {
  document.getElementById('loading').classList.toggle('show', show);
}

function showError(msg) {
  setResultsArea(`<div class="empty-state"><div class="big-icon">⚠</div><p>${esc(msg)}</p></div>`);
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
async function openFile(dataset, docName, pageNum) {
  if (!dataset || !docName) return;
  const d = await api('open_file', dataset, docName, pageNum);
  if (d && d.error) alert('Could not open file: ' + d.error);
}
function navigate(page) {
  const base = window.location.href.replace(/[^/]+$/, '');
  window.location.href = base + page;
}
