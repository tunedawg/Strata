name: Build Installers

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:

  # ── Windows: produces UniversalSearch_Setup.exe ─────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller flask pdfplumber pypdf python-docx openpyxl
          pip install reportlab python-pptx extract-msg pillow pytesseract pdf2image pystray

      - name: Install Inno Setup
        run: choco install innosetup --yes
        shell: cmd

      - name: Build with PyInstaller + Inno Setup
        run: |
          pyinstaller universal_search.spec --noconfirm
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        shell: cmd

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: UniversalSearch-Windows
          path: dist\UniversalSearch_Setup.exe
          retention-days: 30

  # ── macOS: produces UniversalSearch.dmg ─────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip3 install pyinstaller flask pdfplumber pypdf python-docx openpyxl
          pip3 install reportlab python-pptx extract-msg pillow pytesseract pdf2image

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build with PyInstaller
        run: python3 -m pyinstaller universal_search.spec --noconfirm

      - name: Package into DMG
        run: |
          create-dmg \
            --volname "Universal Search" \
            --window-pos 200 120 \
            --window-size 540 360 \
            --icon-size 128 \
            --icon "UniversalSearch.app" 160 180 \
            --app-drop-link 380 180 \
            "dist/UniversalSearch.dmg" \
            "dist/UniversalSearch.app" || true

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: UniversalSearch-Mac
          path: dist/UniversalSearch.dmg
          retention-days: 30
